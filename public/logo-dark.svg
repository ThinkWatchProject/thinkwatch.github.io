<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" fill="none">
  <!-- icon (same artwork, white seal on dark background) -->
  <rect width="200" height="200" rx="40" fill="#1E2A4A"/>
  <rect x="32" y="32" width="136" height="136" rx="28"
        fill="none" stroke="#3DDBD9" stroke-width="10"/>
  <line x1="62" y1="68" x2="138" y2="68"
        stroke="#3DDBD9" stroke-width="12" stroke-linecap="round"/>
  <line x1="100" y1="68" x2="100" y2="104"
        stroke="#3DDBD9" stroke-width="12" stroke-linecap="round"/>
  <polyline points="62,104 80,140 100,104"
            fill="none" stroke="#3DDBD9" stroke-width="12"
            stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="100,104 120,140 138,104"
            fill="none" stroke="#3DDBD9" stroke-width="12"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- wordmark — light text for dark backgrounds -->
  <text x="240" y="128"
        font-family="Geist, 'Inter Display', Inter, system-ui, -apple-system, 'Helvetica Neue', sans-serif"
        font-size="92"
        letter-spacing="-2"
        fill="#F8FAFC">
    <tspan font-weight="500">Think</tspan><tspan font-weight="700">Watch</tspan>
  </text>
</svg>
