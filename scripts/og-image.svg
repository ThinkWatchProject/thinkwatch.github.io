<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#11111a"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="50%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#F472B6"/>
    </linearGradient>
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F472B6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#F472B6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
    <filter id="blur"><feGaussianBlur stdDeviation="40"/></filter>
  </defs>

  <!-- Base -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Aurora orbs -->
  <circle cx="180" cy="120" r="320" fill="url(#orb1)" filter="url(#blur)"/>
  <circle cx="1080" cy="180" r="280" fill="url(#orb2)" filter="url(#blur)"/>
  <circle cx="600" cy="600" r="320" fill="url(#orb3)" filter="url(#blur)"/>

  <!-- Logo -->
  <g transform="translate(80,80)">
    <rect width="56" height="56" rx="14" fill="url(#brand)"/>
    <path d="M14 28 L24 38 L42 18" fill="none" stroke="#0a0a0f" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="76" y="38" font-family="-apple-system, system-ui, sans-serif" font-size="26" font-weight="600" fill="#ffffff" letter-spacing="-0.5">ThinkWatch</text>
  </g>

  <!-- Pill badge -->
  <g transform="translate(80,180)">
    <rect width="240" height="34" rx="17" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.12)"/>
    <circle cx="20" cy="17" r="3.5" fill="#22D3EE"/>
    <text x="34" y="22" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#9CA3AF" letter-spacing="0.5">v0.1.0 — PUBLIC PREVIEW</text>
  </g>

  <!-- Headline -->
  <g transform="translate(80,260)" font-family="-apple-system, system-ui, sans-serif" font-weight="600" letter-spacing="-2.5">
    <text x="0" y="0" font-size="78" fill="#ffffff">The secure gateway</text>
    <text x="0" y="92" font-size="78" fill="#ffffff">for <tspan fill="url(#brand)">all your AI traffic</tspan></text>
  </g>

  <!-- Subhead -->
  <text x="80" y="500" font-family="-apple-system, system-ui, sans-serif" font-size="22" fill="#9CA3AF" letter-spacing="-0.2">
    One control plane. Every model request. Every MCP tool call. Authenticated, audited, accounted for.
  </text>

  <!-- Bottom row chips -->
  <g transform="translate(80,560)" font-family="ui-monospace, Menlo, monospace" font-size="13" fill="#6B7280" letter-spacing="1.5">
    <text x="0" y="14">RUST + AXUM</text>
    <text x="140" y="14">·</text>
    <text x="160" y="14">2 MB DISTROLESS</text>
    <text x="320" y="14">·</text>
    <text x="340" y="14">OPENAI · ANTHROPIC · GEMINI · BEDROCK</text>
    <text x="700" y="14">·</text>
    <text x="720" y="14">BSL 1.1</text>
  </g>

  <!-- URL bottom-right -->
  <text x="1120" y="595" font-family="ui-monospace, Menlo, monospace" font-size="14" fill="#9CA3AF" text-anchor="end" letter-spacing="0.5">thinkwat.ch</text>
</svg>
